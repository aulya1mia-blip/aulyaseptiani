<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000000, #e5aeff, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 420px;
    text-align: center;
    padding: 20px;
}

/* FOTO */
.profile img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid white;
    margin-bottom: 15px;
}

/* USERNAME */
.username {
    font-size: 22px;
    font-weight: 600;
    color: white;
    margin-bottom: 5px;
}

/* BIO */
.bio {
    font-size: 14px;
    color: #eaeaea;
    margin-bottom: 25px;
}

/* BUTTON */
.link {
    display: block;
    background: white;
    padding: 14px;
    border-radius: 25px;
    margin: 12px 0;
    text-decoration: none;
    color: black;
    font-weight: 500;
    transition: 0.25s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

/* HOVER */
.link:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
</style>
</head>
